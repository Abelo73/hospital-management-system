# Test Configuration for Hospital Management System

spring.application.name=hospital-management-system

# Test Database Configuration (H2 in-memory for tests)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration for tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for debugging tests)
spring.h2.console.enabled=true

# Flyway Configuration (disabled for tests - using ddl-auto instead)
spring.flyway.enabled=false

# JWT Configuration for tests
jwt.secret=testSecretKeyForTestingPurposesOnlyMinimum256BitsLongEnoughForSecurity
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000

# Redis Configuration (disabled for tests)
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=none

# Mail Configuration (disabled for tests)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# MinIO Configuration (disabled for tests)
file-storage.provider=local
file-storage.bucket-name=test-bucket

# Logging
logging.level.root=INFO
logging.level.com.act.hospitalmanagementsystem=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# Test-specific settings
server.port=8081
server.servlet.context-path=/api/v1

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Cookie Configuration
app.cookie.secure=false
app.cookie.same-site=lax
