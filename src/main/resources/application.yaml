spring:
  application:
    name: hospital-management-system

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:hospital_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${DDL_AUTO:none}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  cache:
    type: redis

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:5000}ms

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

server:
  port: 8080
  servlet:
    context-path: /api/v1

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    com.hms: DEBUG
  filter:
    enabled: ${LOGGING_FILTER_ENABLED:true}
    include-payload: ${LOGGING_FILTER_INCLUDE_PAYLOAD:true}
    max-payload-length: ${LOGGING_FILTER_MAX_PAYLOAD_LENGTH:1000}

jwt:
  secret: ${JWT_SECRET:veryLongSecretKeyForHospitalManagementSystem2026VerySecure}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

hospital:
  patient:
    id-prefix: PAT
  appointment:
    id-prefix: APP
  consultation:
    id-prefix: CON
  prescription:
    id-prefix: PRE
  laboratory:
    id-prefix: LAB
  invoice:
    id-prefix: INV
  employee:
    id-prefix: EMP

file-storage:
  provider: minio
  bucket-name: ${MINIO_BUCKET_NAME:hospital-files}
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}

notification:
  email:
    enabled: true
  sms:
    enabled: false

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}

app:
  admin:
    email: admin@hospital.com
    default-password: Admin@123
  cookie:
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAME_SITE:lax}

rate:
  limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    default:
      capacity: 100
      refill-tokens: 100
      refill-duration: 1m
    strict:
      capacity: 10
      refill-tokens: 10
      refill-duration: 1m
    lenient:
      capacity: 200
      refill-tokens: 200
      refill-duration: 1m

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs