spring:
  application:
    name: hospital-management-system

  datasource:
    url: jdbc:postgresql://localhost:5432/hospital_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  cache:
    type: redis

  data:
    redis:
      host: localhost
      port: 6380
      timeout: 5000ms

  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,beans
  endpoint:
    health:
      show-details: always

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    com.hms: DEBUG

jwt:
  secret: veryLongSecretKeyForHospitalManagementSystem2026VerySecure
  access-token-expiration: 3600000
  refresh-token-expiration: 604800000

hospital:
  patient:
    id-prefix: PAT
  appointment:
    id-prefix: APP
  consultation:
    id-prefix: CON
  prescription:
    id-prefix: PRE
  laboratory:
    id-prefix: LAB
  invoice:
    id-prefix: INV
  employee:
    id-prefix: EMP

file-storage:
  provider: minio
  bucket-name: hospital-files
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin

notification:
  email:
    enabled: true
  sms:
    enabled: false

cors:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:5173
    - http://localhost:5174

app:
  admin:
    email: admin@hospital.com
    default-password: Admin@123

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs